<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>神雕侠侣 · 智能挂机高端定制版</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: "Microsoft YaHei", sans-serif; padding: 20px; margin: 0; }
        
        /* ===== 开局遮罩 ===== */
        #introOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c1a1a 0%, #0a0a0a 100%);
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .intro-text { font-size: 20px; color: #cc9933; margin-bottom: 30px; font-style: italic; letter-spacing: 2px; }
        .btn-enter-江湖 {
            background: linear-gradient(135deg, #a00000, #5c0000); color: #fff;
            border: 2px solid #cc9933; padding: 15px 40px; cursor: pointer;
            font-size: 20px; font-weight: bold; border-radius: 5px; box-shadow: 0 0 15px rgba(204,153,51,0.4);
            transition: all 0.3s;
        }
        .btn-enter-江湖:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(204,153,51,0.8); }

        /* ===== 欢迎大厅 ===== */
        #startScreen { max-width: 800px; margin: 60px auto; text-align: center; padding: 40px 20px; position: relative; }
        .game-title { font-size: 54px; color: #d4a359; margin-bottom: 5px; font-weight: bold; letter-spacing: 6px; font-family: "楷体", "STKaiti", sans-serif; text-shadow: 0 0 10px rgba(212, 163, 89, 0.5); }
        .game-version { display: inline-block; background-color: rgba(0, 0, 0, 0.4); border: 1px solid #4a3c28; color: #a69275; font-size: 13px; padding: 3px 12px; border-radius: 3px; margin-bottom: 15px; }
        .game-intro { font-size: 14px; color: #8c8273; margin-bottom: 40px; letter-spacing: 1px; }
        .music-bar { position: absolute; top: 10px; right: 10px; z-index: 10; }
        .btn-music-toggle { background-color: rgba(0, 0, 0, 0.6); border: 1px solid #4a3c28; color: #a69275; padding: 6px 15px; font-size: 13px; border-radius: 4px; cursor: pointer; }
        .menu-group { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .btn-menu { width: 320px; background: rgba(38, 38, 38, 0.4); color: #a69275; border: 1px solid #4a3c28; padding: 12px 0; cursor: pointer; font-size: 16px; border-radius: 4px; transition: all 0.2s; }
        .btn-menu.btn-primary { background: #a37532; color: #fff; border: 1px solid #d4a359; font-weight: bold; }
        .btn-menu:hover:not(:disabled) { background: rgba(212, 163, 89, 0.2); border-color: #d4a359; color: #fff; }
        .btn-menu:disabled { background: rgba(30, 30, 30, 0.3); border-color: #333; color: #555; cursor: not-allowed; }

        /* ===== 系统设置高级大弹窗 ===== */
        #settingsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #222; border: 2px solid #5c4033; padding: 25px; border-radius: 8px; width: 650px; max-height: 85vh; overflow-y: auto; text-align: center; box-sizing: border-box; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .settings-tabs { display: flex; gap: 5px; border-bottom: 1px solid #4a3c28; margin-bottom: 15px; padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 10px 0; background: #141414; color: #a69275; border: 1px solid #4a3c28; cursor: pointer; font-size: 13px; border-radius: 4px 4px 0 0; }
        .tab-btn.active { background: #a37532; color: #fff; border-color: #d4a359; font-weight: bold; }
        .tab-panel { display: none; text-align: left; }
        .tab-panel.active { display: block; }
        .setting-item { margin-bottom: 15px; text-align: left; }
        .setting-item label { font-size: 14px; color: #cc9933; font-weight: bold; display: block; margin-bottom: 8px; }
        .volume-container { display: flex; align-items: center; gap: 10px; background: #111; padding: 8px; border-radius: 4px; border: 1px solid #444; }
        .volume-slider { flex: 1; accent-color: #cc9933; cursor: pointer; }
        select { padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        /* 酒馆管理系统样式 */
        .item-manager-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-small { background: #4a3c28; border: 1px solid #cc9933; color: #e0e0e0; padding: 4px 10px; font-size: 12px; border-radius: 3px; cursor: pointer; margin-left: 2px; }
        .btn-small:hover { background: #a37532; color: #fff; }
        .btn-import-label { background: #1c3c28; border: 1px solid #4caf50; color: #e0e0e0; padding: 4px 10px; font-size: 12px; border-radius: 3px; cursor: pointer; display: inline-block; }
        .btn-import-label:hover { background: #4caf50; color: #fff; }
        
        .item-list-container { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; background: #141414; padding: 8px; border: 1px solid #333; border-radius: 4px; }
        .prompt-item-card { background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .prompt-item-card.disabled-card { opacity: 0.5; background: #1f1f1f; }
        .card-top-row { display: flex; justify-content: space-between; align-items: center; }
        .card-meta { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: #cc9933; }
        .card-tag { font-size: 11px; background: #5c4033; color: #d4a359; padding: 1px 5px; border-radius: 3px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-controls { display: flex; align-items: center; gap: 12px; }
        
        /* 排序箭头 */
        .order-arrows { display: flex; flex-direction: column; gap: 2px; }
        .arrow-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 11px; padding: 0 2px; line-height: 1; }
        .arrow-btn:hover { color: #cc9933; }
        
        /* Switch 开关 */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #a37532; }
        input:checked + .slider:before { transform: translateX(16px); }

        .card-edit-area { width: 100%; background: #1a1a1a; color: #ddd; border: 1px solid #444; border-radius: 3px; padding: 6px; box-sizing: border-box; font-size: 12px; resize: vertical; font-family: monospace; }
        .card-edit-area:focus { border-color: #cc9933; outline: none; }

        /* ===== 游戏核心界面 ===== */
        #gameScreen { display: none; max-width: 800px; margin: 0 auto; }
        .game-container { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .panel { border: 2px solid #5c4033; padding: 15px; background-color: #262626; border-radius: 8px; }
        h3 { color: #cc9933; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 0; }
        .chat-box { height: 350px; overflow-y: auto; background: #111; padding: 15px; border: 1px solid #444; margin-bottom: 15px; }
        .user-msg { color: #4caf50; margin: 5px 0; }
        .ai-msg { color: #cc9933; margin: 5px 0; }
        .sys-msg { color: #ff9800; font-style: italic; font-size: 13px; }
        .input-area { display: flex; gap: 10px; }
        button.btn-action { background: #8b0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .highlight { color: #ffeb3b; }
    </style>
</head>
<body>

<div id="introOverlay">
    <div class="intro-text">“这次，换你执剑卫襄阳，亦或是执手小龙女？”</div>
    <button class="btn-enter-江湖" onclick="awaken江湖()">拔剑 · 踏入江湖</button>
</div>

<audio id="bgMusic" loop src="bgm.mp3"></audio>

<div id="startScreen">
    <div class="music-bar"><button id="musicBtn" class="btn-music-toggle" onclick="toggleMusic()">🔇 开启乐声</button></div>
    <div class="game-title">神雕侠侣</div>
    <div class="game-version">完美修复防死锁版 V0.1.8</div>
    <div class="game-intro">沉浸式的模块化提示词武侠世界（免API亦可完美开局体验）</div>
    <div class="menu-group">
        <button class="btn-menu btn-primary" onclick="startNewGame()">开始新人生</button>
        <button class="btn-menu" id="btnContinue" disabled onclick="continueGame()">读取人生 (无)</button>
        <button class="btn-menu" onclick="alert('更新日志：V0.1.8 解除了必须填API才能开局的死锁逻辑，修复了遮罩层，没有填Key时会自动转为本地离线文本沙盒模拟模式！')">更新日志</button>
        <button class="btn-menu" onclick="toggleSettings(true)">系统设置</button>
    </div>
</div>

<div id="settingsModal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; letter-spacing: 2px;">【 系统天机阁 · 高级设置 】</h3>
        
        <div class="settings-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-music', this)">🎵 声乐</button>
            <button class="tab-btn" onclick="switchTab('tab-api', this)">🌐 接口天眼</button>
            <button class="tab-btn" onclick="switchTab('tab-preset', this)">📜 剧情正文预设</button>
            <button class="tab-btn" onclick="switchTab('tab-lorebook', this)">📖 模块化世界书</button>
        </div>
        
        <div id="tab-music" class="tab-panel active">
            <div class="setting-item">
                <label for="volumeSlider">🎵 背景音乐音量：<span id="volumeVal">50%</span></label>
                <div class="volume-container">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" oninput="adjustVolume(this.value)">
                    <span>🔊</span>
                </div>
            </div>
        </div>

        <div id="tab-api" class="tab-panel">
            <div class="setting-item">
                <label for="apiUrlInput">🌐 接口地址 (Base URL)：</label>
                <input type="text" id="apiUrlInput" placeholder="例如: https://api.deepseek.com/v1">
            </div>
            <div class="setting-item">
                <label for="apiKeyInput">🔑 API Key：</label>
                <input type="password" id="apiKeyInput" placeholder="输入你的 API Key (sk-xxxx，为空时自动启用本地武侠沙盒)">
            </div>
            <div class="setting-item">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <label style="margin:0;">🤖 选择模型：</label>
                    <button class="btn-small" onclick="fetchAvailableModels()">获取模型</button>
                </div>
                <select id="modelSelect"><option value="">-- 本地沙盒模拟 / 请先获取大模型 --</option></select>
            </div>
        </div>

        <div id="tab-preset" class="tab-panel">
            <div class="item-manager-header">
                <span style="font-size:13px; color:#aaa;">当前启用的条目将拼入 System Prompt</span>
                <div>
                    <label class="btn-import-label" for="importPresetFile">📥 导入 JSON</label>
                    <input type="file" id="importPresetFile" accept=".json" style="display:none;" onchange="handleJsonImport(this, 'preset')">
                    <button class="btn-small" onclick="addNewPromptItem('preset')">+ 新增条目</button>
                    <button class="btn-small" onclick="resetDefaultItems('preset')">重置默认</button>
                </div>
            </div>
            <div id="presetItemsContainer" class="item-list-container"></div>
        </div>

        <div id="tab-lorebook" class="tab-panel">
            <div class="item-manager-header">
                <span style="font-size:13px; color:#aaa;">关键词触发式世界观规则设定</span>
                <div>
                    <label class="btn-import-label" for="importLorebookFile">📥 导入 JSON</label>
                    <input type="file" id="importLorebookFile" accept=".json" style="display:none;" onchange="handleJsonImport(this, 'lorebook')">
                    <button class="btn-small" onclick="addNewPromptItem('lorebook')">+ 新增规则</button>
                    <button class="btn-small" onclick="resetDefaultItems('lorebook')">重置默认</button>
                </div>
            </div>
            <div id="lorebookItemsContainer" class="item-list-container"></div>
        </div>

        <div style="display:flex; gap:10px; justify-content:center; flex-wrap: wrap; margin-top: 25px;">
            <button class="btn-action" style="background:#4caf50;" onclick="saveSettings()">保存天机配置</button>
            <button class="btn-action" style="background:#555;" onclick="toggleSettings(false)">关闭</button>
            <button class="btn-action" style="background:#cc9933; color:#1a1a1a; width: 100%; margin-top: 10px;" onclick="toggleSettings(false); returnToMain();">返回主页面</button>
        </div>
    </div>
</div>

<div id="gameScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button class="btn-action" style="background:#555; padding:5px 15px;" onclick="returnToMain()">返回主页</button>
        <h2 style="color: #cc9933; margin: 0;">神雕侠侣 · 智能江湖</h2>
        <div style="color:#888; font-size:12px;">自动保存已开启 ✨</div>
    </div>
    
    <div class="game-container">
        <div class="panel">
            <h3>【 角色状态 】</h3>
            <p>气血: <span id="hp" class="highlight">100</span> / 100</p>
            <p>内力: <span id="mp" class="highlight">50</span> / 50</p>
            <p>修为: <span id="exp" class="highlight">0</span></p>
            <h3>【 背包物品 】</h3>
            <ul id="inventory" style="padding-left: 20px; font-size: 14px;"></ul>
        </div>
        <div class="panel">
            <h3>【 当前场景：终南山下 】</h3>
            <div id="chatBox" class="chat-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" style="padding:10px; background:#333; color:#fff; border:1px solid #555; border-radius:4px; flex:1;" placeholder="输入你的应对之策..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="btn-action" onclick="sendMessage()">交互</button>
            </div>
        </div>
    </div>
</div>

<script>
    let player = { hp: 100, mp: 50, exp: 0, inventory: ["初学木剑 x1"] };
    let chatHistory = []; 
    let systemMemory = []; 
    let isMusicPlaying = false; 

    let presetList = [];
    let lorebookList = [];

    const defaultPresets = [
        { id: "p1", name: "原著内核绑定", tag: "system", content: "你现在是金庸武侠巨著《神雕侠侣》的文字挂机游戏剧情引擎。必须严格契合原著南宋末年、蒙古入侵、李莫愁因情生恨血洗江湖等背景设定。", enabled: true },
        { id: "p2", name: "角色防崩坏锁", tag: "emotion", content: "维持杨过、小龙女、郭靖、黄蓉等原著NPC的心智锚点，防止其性格出现现代词汇崩坏或极端情绪失控。", enabled: true },
        { id: "p3", name: "生动化文本叙事", tag: "vividness", content: "使用带有传统评书、古典武侠章回小说韵味的叙事风格，多描写动作身法、刀光剑影及环境氛围。", enabled: true }
    ];

    const defaultLorebooks = [
        { id: "l1", name: "古墓派玉女心经", tag: "keyword:古墓", content: "【世界书触发：古墓派门规严苛，玉女心经需男女二人合练，且修炼时需敞开衣襟散热，讲求断绝七情六欲。】", enabled: true, trigger: "古墓" },
        { id: "l2", name: "全真教金雁功", tag: "keyword:全真", content: "【世界书触发：全真教为天下正宗，终南山重阳宫防守严密。其基础轻功金雁功练至深处可凌空漫步。】", enabled: true, trigger: "全真" }
    ];

    window.onload = function() {
        const savedUrl = localStorage.getItem('sd_api_url');
        if(savedUrl) document.getElementById('apiUrlInput').value = savedUrl;
        const savedKey = localStorage.getItem('sd_api_key');
        if(savedKey) document.getElementById('apiKeyInput').value = savedKey;
        const savedModel = localStorage.getItem('sd_api_model');
        if(savedModel) {
            document.getElementById('modelSelect').innerHTML = `<option value="${savedModel}">${savedModel}</option>`;
        }

        presetList = localStorage.getItem('sd_preset_list') ? JSON.parse(localStorage.getItem('sd_preset_list')) : [...defaultPresets];
        lorebookList = localStorage.getItem('sd_lorebook_list') ? JSON.parse(localStorage.getItem('sd_lorebook_list')) : [...defaultLorebooks];

        renderPromptList('preset');
        renderPromptList('lorebook');

        if(localStorage.getItem('sd_player_save')) {
            document.getElementById('btnContinue').disabled = false;
            document.getElementById('btnContinue').innerText = "读取人生";
        }
        document.getElementById('bgMusic').volume = 0.5;
    }

    /* ===== JSON 智能解析导入 ===== */
    function handleJsonImport(inputElement, type) {
        const file = inputElement.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                let incomingEntries = [];

                if (Array.isArray(importedData)) {
                    incomingEntries = importedData.map(item => ({
                        id: item.id || ('imported_' + Date.now() + Math.random().toString(36).substr(2, 5)),
                        name: item.name || "未命名导入条目",
                        tag: item.tag || (type === 'preset' ? "custom" : "keyword:无"),
                        content: item.content || item.value || "",
                        enabled: item.enabled !== undefined ? item.enabled : true,
                        trigger: item.trigger || ""
                    }));
                } 
                else if (importedData.entries && typeof importedData.entries === 'object') {
                    Object.keys(importedData.entries).forEach(key => {
                        const entry = importedData.entries[key];
                        const triggerWord = (entry.key && entry.key.length > 0) ? entry.key[0] : "无";
                        incomingEntries.push({
                            id: entry.uid || ('st_' + Date.now() + Math.random().toString(36).substr(2, 5)),
                            name: entry.comment || triggerWord || "酒馆导入词条",
                            tag: type === 'preset' ? "tavern" : `keyword:${triggerWord}`,
                            content: entry.content || "",
                            enabled: entry.enabled !== undefined ? entry.enabled : true,
                            trigger: triggerWord
                        });
                    });
                }
                else if (typeof importedData === 'object' && importedData !== null) {
                    incomingEntries.push({
                        id: 'imported_obj_' + Date.now(),
                        name: importedData.name || importedData.comment || "导入单体条目",
                        tag: importedData.tag || "custom",
                        content: importedData.content || importedData.value || "",
                        enabled: true,
                        trigger: importedData.trigger || ""
                    });
                }

                incomingEntries = incomingEntries.filter(item => item.content.trim() !== "");

                if (incomingEntries.length === 0) {
                    alert("未能从中读取到有效的提示词文本！请检查格式。");
                    return;
                }

                if (type === 'preset') {
                    presetList = [...presetList, ...incomingEntries];
                    renderPromptList('preset');
                } else {
                    lorebookList = [...lorebookList, ...incomingEntries];
                    renderPromptList('lorebook');
                }

                alert(`成功导入 ${incomingEntries.length} 条江湖规则至列表尾部！`);
            } catch (err) {
                alert("JSON 文件解析失败: " + err.message);
            }
            inputElement.value = '';
        };
        reader.readAsText(file);
    }

    /* ===== 酒馆式 UI 渲染 ===== */
    function renderPromptList(type) {
        const container = document.getElementById(type === 'preset' ? 'presetItemsContainer' : 'lorebookItemsContainer');
        const list = type === 'preset' ? presetList : lorebookList;
        container.innerHTML = '';

        list.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `prompt-item-card ${item.enabled ? '' : 'disabled-card'}`;
            
            card.innerHTML = `
                <div class="card-top-row">
                    <div class="card-meta">
                        <span>${index + 1}.</span>
                        <span style="color:#fff;">${item.name}</span>
                        <span class="card-tag" title="${item.tag}">${item.tag}</span>
                    </div>
                    <div class="card-controls">
                        <div class="order-arrows">
                            <button class="arrow-btn" onclick="moveItem('${type}', ${index}, -1)">▲</button>
                            <button class="arrow-btn" onclick="moveItem('${type}', ${index}, 1)">▼</button>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${item.enabled ? 'checked' : ''} onchange="toggleItem('${type}', ${index}, this.checked)">
                            <span class="slider"></span>
                        </label>
                        <button class="arrow-btn" style="color:#ff5555;font-size:14px;" onclick="deleteItem('${type}', ${index})">×</button>
                    </div>
                </div>
                ${type === 'lorebook' ? `
                    <div style="margin-bottom:4px; display:flex; align-items:center; gap:5px;">
                        <span style="font-size:11px; color:#a69275;">触发核心词:</span>
                        <input type="text" value="${item.trigger || ''}" style="background:#111; border:1px solid #444; color:#fff; font-size:11px; padding:2px 5px; border-radius:3px; width:80px;" onchange="updateItemTrigger('${index}', this.value)">
                    </div>
                ` : ''}
                <textarea class="card-edit-area" rows="2" onchange="updateItemContent('${type}', ${index}, this.value)">${item.content}</textarea>
            `;
            container.appendChild(card);
        });
    }

    function toggleItem(type, index, isChecked) {
        const list = type === 'preset' ? presetList : lorebookList;
        list[index].enabled = isChecked;
        renderPromptList(type);
    }

    function moveItem(type, index, direction) {
        const list = type === 'preset' ? presetList : lorebookList;
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= list.length) return;
        
        const temp = list[index];
        list[index] = list[targetIndex];
        list[targetIndex] = temp;
        
        renderPromptList(type);
    }

    function updateItemContent(type, index, newVal) {
        const list = type === 'preset' ? presetList : lorebookList;
        list[index].content = newVal;
    }

    function updateItemTrigger(index, newVal) {
        lorebookList[index].trigger = newVal;
        lorebookList[index].tag = `keyword:${newVal}`;
        renderPromptList('lorebook');
    }

    function addNewPromptItem(type) {
        if (type === 'preset') {
            presetList.push({ id: 'custom_' + Date.now(), name: "新增自定义预设", tag: "custom", content: "在此键入特定的AI设定...", enabled: true });
            renderPromptList('preset');
        } else {
            lorebookList.push({ id: 'custom_l_' + Date.now(), name: "新世界观规则", tag: "keyword:无", content: "【触发提示词内容】", enabled: true, trigger: "无" });
            renderPromptList('lorebook');
        }
    }

    function deleteItem(type, index) {
        if(!confirm("确定要删除此条规则条目吗？")) return;
        const list = type === 'preset' ? presetList : lorebookList;
        list.splice(index, 1);
        renderPromptList(type);
    }

    function resetDefaultItems(type) {
        if(!confirm("是否确认还原默认？现有的编辑将被覆盖。")) return;
        if (type === 'preset') {
            presetList = [...defaultPresets];
            renderPromptList('preset');
        } else {
            lorebookList = [...defaultLorebooks];
            renderPromptList('lorebook');
        }
    }

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    function toggleSettings(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }

    function saveSettings() {
        localStorage.setItem('sd_api_url', document.getElementById('apiUrlInput').value.trim());
        localStorage.setItem('sd_api_key', document.getElementById('apiKeyInput').value.trim());
        if(document.getElementById('modelSelect').value) {
            localStorage.setItem('sd_api_model', document.getElementById('modelSelect').value);
        }
        
        localStorage.setItem('sd_preset_list', JSON.stringify(presetList));
        localStorage.setItem('sd_lorebook_list', JSON.stringify(lorebookList));

        alert('设置已成功安全封存入本地！');
        toggleSettings(false);
    }

    /* ===== 大模型剧情请求与离线降级沙盒控制内核 ===== */
    async function sendMessage() {
        let apiUrl = localStorage.getItem('sd_api_url') || 'https://api.deepseek.com/v1';
        const apiKey = localStorage.getItem('sd_api_key');
        const apiModel = localStorage.getItem('sd_api_model') || 'deepseek-chat';
        const userInputText = document.getElementById('userInput').value.trim();
        if (!userInputText) return;

        const chatBox = document.getElementById('chatBox');
        const userHtml = `<p class="user-msg"><strong>你：</strong>${userInputText}</p>`;
        chatBox.innerHTML += userHtml;
        chatHistory.push(userHtml);
        document.getElementById('userInput').value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        const loadingId = 'loading-' + Date.now();
        chatBox.innerHTML += `<p class="ai-msg" id="${loadingId}"><strong>系统：</strong>正飞鸽传书推演风云...</p>`;
        systemMemory.push({ "role": "user", "content": userInputText });

        // ===== 核心降级逻辑：如果没有配置 Key，自动转入前端模拟运行模式 =====
        if (!apiKey) {
            setTimeout(() => {
                let worldResponse = `你正欲行“${userInputText}”。忽然微风拂过，长剑轻鸣。`;
                let hp_c = 0, exp_c = 10, item_c = "";
                
                // 根据输入模拟世界书触发提示
                lorebookList.forEach(item => {
                    if (item.enabled && item.trigger && userInputText.includes(item.trigger)) {
                        worldResponse += ` (惊动了神秘线索：你脑海中闪过关于【${item.trigger}】的传闻，似乎与该处的秘籍或规矩息息相关...)`;
                    }
                });

                if(userInputText.includes("打") || userInputText.includes("战") || userInputText.includes("杀")) {
                    hp_c = -15; exp_c = 30; item_c = "战场残剑 x1";
                    worldResponse += ` 眼前猛然间剑拔弩张！你历经一番血战，虽然受了些许轻伤，却对武学奥义有了全新领悟。`;
                } else if(userInputText.includes("搜") || userInputText.includes("找") || userInputText.includes("看")) {
                    item_c = "金创药 x1";
                    worldResponse += ` 你四下谨慎搜寻，在碎石缝隙或古墓暗格内惊喜地寻获了一件可防身、疗伤的物品。`;
                } else {
                    worldResponse += ` 江湖局势变幻莫测，周遭的武林人士正冷冷地打量着你，且看你下一步如何抉择。`;
                }

                document.getElementById(loadingId).outerHTML = `<p class="ai-msg"><strong>【本地沙盒模拟器】江湖风云：</strong>${worldResponse}</p>`;
                chatHistory.push(`<p class="ai-msg"><strong>【本地沙盒模拟器】江湖风云：</strong>${worldResponse}</p>`);
                systemMemory.push({ "role": "assistant", "content": worldResponse });

                // 结算
                if (hp_c) { player.hp += hp_c; document.getElementById('hp').innerText = player.hp; logAndSaveSys(`[本地] 气血变化: ${hp_c}`); }
                if (exp_c) { player.exp += exp_c; document.getElementById('exp').innerText = player.exp; logAndSaveSys(`[本地] 修为变化: +${exp_c}`); }
                if (item_c) { player.inventory.push(item_c); updateInventoryUI(); logAndSaveSys(`[本地] 获得物品: 【${item_c}】`); }
                saveGame();
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
            return;
        }

        // ===== 大模型网络请求逻辑 =====
        if(apiUrl.endsWith('/')) apiUrl = apiUrl.slice(0, -1);
        const chatUrl = apiUrl.endsWith('/chat/completions') ? apiUrl : apiUrl + '/chat/completions';

        try {
            let compiledSystemPrompt = "";
            presetList.forEach(item => {
                if (item.enabled && item.content) {
                    compiledSystemPrompt += item.content + "\n";
                }
            });

            let triggeredLoreContent = "";
            lorebookList.forEach(item => {
                if (item.enabled && item.trigger && userInputText.includes(item.trigger)) {
                    triggeredLoreContent += `\n${item.content}`;
                }
            });

            if(triggeredLoreContent) {
                compiledSystemPrompt += `\n【当前遭遇线索世界观背景补充】:${triggeredLoreContent}\n`;
            }

            compiledSystemPrompt += `
            【核心自动化运行协议】
            当前玩家状态：气血 ${player.hp}, 内力 ${player.mp}, 背包: ${player.inventory.join(',')}。
            必须顺应玩家的选择衍生剧情，严格返回以下格式的合法纯 JSON，不要包含任何常规文本或 Markdown 块标签包裹：
            {
                "reply": "遭遇到的武林风云变幻，NPC人物对话或江湖场景刻画描写",
                "hp_change": 0, 
                "exp_change": 0, 
                "get_item": "" 
            }`;

            const response = await fetch(chatUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: apiModel,
                    messages: [
                        { "role": "system", "content": compiledSystemPrompt },
                        ...systemMemory.slice(-8)
                    ],
                    temperature: 0.6 
                })
            });

            if (!response.ok) throw new Error(`天机中断，HTTP 状态码: ${response.status}`);
            const data = await response.json();
            let rawContent = data.choices[0].message.content.trim();

            if (rawContent.startsWith("```")) {
                rawContent = rawContent.replace(/^```[a-zA-Z]*\s*/, "").replace(/\s*```$/, "");
            }

            let gameResult;
            try {
                gameResult = JSON.parse(rawContent);
            } catch (jsonErr) {
                gameResult = { "reply": rawContent, "hp_change": 0, "exp_change": 5, "get_item": "" };
            }

            systemMemory.push({ "role": "assistant", "content": gameResult.reply });
            document.getElementById(loadingId).outerHTML = `<p class="ai-msg"><strong>江湖风云：</strong>${gameResult.reply}</p>`;
            chatHistory.push(`<p class="ai-msg"><strong>江湖风云：</strong>${gameResult.reply}</p>`);

            if (gameResult.hp_change) { player.hp += gameResult.hp_change; document.getElementById('hp').innerText = player.hp; logAndSaveSys(`[系统] 气血变化: ${gameResult.hp_change}`); }
            if (gameResult.exp_change) { player.exp += gameResult.exp_change; document.getElementById('exp').innerText = player.exp; logAndSaveSys(`[系统] 修为变化: +${gameResult.exp_change}`); }
            if (gameResult.get_item) { player.inventory.push(gameResult.get_item); updateInventoryUI(); logAndSaveSys(`[系统] 获得物品: 【${gameResult.get_item}】`); }

            saveGame(); 
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.error(error);
            document.getElementById(loadingId).outerHTML = `<p class="ai-msg" style="color:red;"><strong>系统错误：</strong>遭遇网络断联，原因: ${error.message}。若无API，请在设置中清空API Key体验离线沙盒。</p>`;
        }
    }

    /* ===== 其他防死锁辅助机制 ===== */
    function awaken江湖() {
        const audio = document.getElementById('bgMusic');
        // 允许音频播放失败，而不卡死界面
        audio.play().then(() => { 
            isMusicPlaying = true; 
            document.getElementById('musicBtn').innerText = "🔊 正在播放"; 
        }).catch(e => { console.log("音频播放因系统安全策略受阻，已静音启动"); });
        
        document.getElementById('introOverlay').style.display = 'none';
    }
    function toggleMusic() {
        const audio = document.getElementById('bgMusic');
        if (!isMusicPlaying) { audio.play().then(() => { isMusicPlaying = true; document.getElementById('musicBtn').innerText = "🔊 正在播放"; }); } 
        else { audio.pause(); isMusicPlaying = false; document.getElementById('musicBtn').innerText = "🔇 开启乐声"; }
    }
    function adjustVolume(value) { document.getElementById('bgMusic').volume = value / 100; document.getElementById('volumeVal').innerText = value + "%"; }
    function startNewGame() {
        chatHistory = [`<p class="ai-msg"><strong>神秘跛足道人：</strong>喂！看你细皮嫩肉的，现在蒙古铁骑逼近，赤练仙子李莫愁满江湖杀人，全真教和活死人墓也不太平，你来凑什么热闹？</p>`];
        enterGameInterface(); 
        saveGame();
    }
    function continueGame() { player = JSON.parse(localStorage.getItem('sd_player_save')); chatHistory = JSON.parse(localStorage.getItem('sd_chat_save'))||[]; systemMemory = JSON.parse(localStorage.getItem('sd_memory_save'))||[]; enterGameInterface(); }
    function enterGameInterface() { document.getElementById('startScreen').style.display = 'none'; document.getElementById('gameScreen').style.display = 'block'; document.getElementById('hp').innerText = player.hp; document.getElementById('mp').innerText = player.mp; document.getElementById('exp').innerText = player.exp; updateInventoryUI(); const cb = document.getElementById('chatBox'); cb.innerHTML = chatHistory.join(''); cb.scrollTop = cb.scrollHeight; }
    function saveGame() { localStorage.setItem('sd_player_save', JSON.stringify(player)); localStorage.setItem('sd_chat_save', JSON.stringify(chatHistory)); localStorage.setItem('sd_memory_save', JSON.stringify(systemMemory)); document.getElementById('btnContinue').disabled = false; document.getElementById('btnContinue').innerText = "读取人生"; }
    function updateInventoryUI() { document.getElementById('inventory').innerHTML = player.inventory.map(item => `<li>${item}</li>`).join(''); }
    function logAndSaveSys(text) { const h = `<p class="sys-msg">${text}</p>`; document.getElementById('chatBox').innerHTML += h; chatHistory.push(h); }
    function returnToMain() { document.getElementById('gameScreen').style.display = 'none'; document.getElementById('startScreen').style.display = 'block'; }
    async function fetchAvailableModels() {
        let url = document.getElementById('apiUrlInput').value.trim(); const key = document.getElementById('apiKeyInput').value.trim();
        if(!url || !key) { alert('请先填好API Key和地址！'); return; }
        if(url.endsWith('/')) url = url.slice(0, -1);
        const fetchUrl = url.endsWith('/chat/completions') ? url.replace('/chat/completions', '/models') : (url.endsWith('/models') ? url : url + '/models');
        const select = document.getElementById('modelSelect'); select.innerHTML = '<option>窥探中...</option>';
        try {
            const res = await fetch(fetchUrl, { method: 'GET', headers: { 'Authorization': `Bearer ${key}` } });
            const data = await res.json();
            if(data && data.data) {
                select.innerHTML = '';
                data.data.forEach(m => { const opt = document.createElement('option'); opt.value = m.id; opt.innerText = m.id; select.appendChild(opt); });
                alert('成功寻获大模型机体列表！');
            }
        } catch (e) { select.innerHTML = '<option>获取失败</option>'; }
    }
</script>
</body>
