<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>神雕侠侣 · 智能挂机独立版</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: "Microsoft YaHei", sans-serif; padding: 20px; margin: 0; }
        
        /* ===== 开局自然唤醒音乐的仪式感遮罩 ===== */
        #introOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c1a1a 0%, #0a0a0a 100%);
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .intro-text { font-size: 20px; color: #cc9933; margin-bottom: 30px; font-style: italic; letter-spacing: 2px; }
        .btn-enter-江湖 {
            background: linear-gradient(135deg, #a00000, #5c0000); color: #fff;
            border: 2px solid #cc9933; padding: 15px 40px; cursor: pointer;
            font-size: 20px; font-weight: bold; border-radius: 5px; box-shadow: 0 0 15px rgba(204,153,51,0.4);
            transition: all 0.3s;
        }
        .btn-enter-江湖:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(204,153,51,0.8); }

        /* ===== 欢迎大厅样式 ===== */
        #startScreen {
            max-width: 500px;
            margin: 80px auto;
            text-align: center;
            border: 2px solid #5c4033;
            padding: 40px 20px;
            background-color: #262626;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
        .game-title { font-size: 36px; color: #cc9933; margin-bottom: 20px; font-weight: bold; letter-spacing: 4px; }
        .game-intro { font-size: 14px; color: #aaa; margin-bottom: 30px; line-height: 1.8; }
        
        /* 大厅按钮组 */
        .menu-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn-menu { 
            width: 70%; background: linear-gradient(135deg, #8b0000, #5c0000); 
            color: #fff; border: 1px solid #cc9933; 
            padding: 12px 0; cursor: pointer; font-size: 18px; 
            font-weight: bold; border-radius: 4px; transition: all 0.2s;
        }
        .btn-menu:hover:not(:disabled) { background: linear-gradient(135deg, #a00000, #700000); transform: scale(1.03); }
        .btn-menu:disabled { background: #444; border-color: #666; color: #888; cursor: not-allowed; }

        /* ===== 背景音乐悬浮控制栏 ===== */
        .music-bar {
            margin-bottom: 20px;
            padding: 8px 15px;
            background-color: #111;
            border: 1px solid #5c4033;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        /* ===== 系统设置弹窗 ===== */
        #settingsModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { 
            background: #262626; border: 2px solid #5c4033; padding: 25px; 
            border-radius: 8px; width: 350px; text-align: center; 
        }
        .setting-item {
            text-align: left; margin-bottom: 20px;
        }
        .setting-item label {
            font-size: 14px; color: #cc9933; font-weight: bold; display: block; margin-bottom: 8px;
        }
        .volume-container {
            display: flex; align-items: center; gap: 10px; background: #111; padding: 8px; border-radius: 4px; border: 1px solid #444;
        }
        .volume-slider {
            flex: 1; accent-color: #cc9933; cursor: pointer;
        }

        /* ===== 游戏核心界面 ===== */
        #gameScreen { display: none; max-width: 800px; margin: 0 auto; }
        .game-container { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .panel { border: 2px solid #5c4033; padding: 15px; background-color: #262626; border-radius: 8px; }
        h3 { color: #cc9933; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 0; }
        .chat-box { height: 350px; overflow-y: auto; background: #111; padding: 15px; border: 1px solid #444; margin-bottom: 15px; }
        .user-msg { color: #4caf50; margin: 5px 0; }
        .ai-msg { color: #cc9933; margin: 5px 0; }
        .sys-msg { color: #ff9800; font-style: italic; font-size: 13px; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"], input[type="password"] { padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; width: 100%; box-sizing: border-box; }
        button.btn-action { background: #8b0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .highlight { color: #ffeb3b; }
    </style>
</head>
<body>

<div id="introOverlay">
    <div class="intro-text">“这次，换你执剑卫襄阳，亦或是执手小龙女？”</div>
    <button class="btn-enter-江湖" onclick="awaken江湖()">拔剑 · 踏入江湖</button>
</div>

<!-- 已配置为只在主大厅播放的 bgm.mp3 -->
<audio id="bgMusic" loop src="bgm.mp3"></audio>

<div id="startScreen">
    <div class="game-title">神雕侠侣 · 独立版</div>
    <div class="game-intro">“问世间，情为何物，直教生死相许？”<br>问情涉足，终南山下，宿命江湖由你执笔。</div>
    
    <div class="music-bar">
        <span>🎵 背景音乐《原点》：</span>
        <button id="musicBtn" class="btn-action" style="padding: 3px 10px; background: #5c4033; font-size:12px;" onclick="toggleMusic()">🔇 已静音</button>
    </div>

    <div class="menu-group">
        <button class="btn-menu" onclick="startNewGame()">开启人生</button>
        <button class="btn-menu" id="btnContinue" disabled onclick="continueGame()">继续人生</button>
        <button class="btn-menu" style="background:#444; border-color:#666;" onclick="toggleSettings(true)">系统设置</button>
    </div>
</div>

<!-- ===== 系统设置弹窗（包含音量调节） ===== -->
<div id="settingsModal">
    <div class="modal-content">
        <h3 style="margin-bottom:20px;">【 系统设置 】</h3>
        
        <!-- 音量调节滑块 -->
        <div class="setting-item">
            <label for="volumeSlider">🎵 背景音乐音量：<span id="volumeVal">50%</span></label>
            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" oninput="adjustVolume(this.value)">
                <span>🔊</span>
            </div>
        </div>

        <!-- API Key配置 -->
        <div class="setting-item">
            <label for="apiKeyInput">🔑 配置大模型 API Key：</label>
            <input type="password" id="apiKeyInput" placeholder="输入你的 API Key (sk-xxxx)">
        </div>

        <div style="display:flex; gap:10px; justify-content:center; flex-wrap: wrap; margin-top: 25px;">
            <button class="btn-action" style="background:#4caf50;" onclick="saveSettings()">保存配置</button>
            <button class="btn-action" style="background:#555;" onclick="toggleSettings(false)">关闭</button>
            <button class="btn-action" style="background:#cc9933; color:#1a1a1a; width: 100%; margin-top: 10px;" onclick="toggleSettings(false); returnToMain();">返回主页面</button>
        </div>
    </div>
</div>

<div id="gameScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button class="btn-action" style="background:#555; padding:5px 15px;" onclick="returnToMain()">返回主页</button>
        <h2 style="color: #cc9933; margin: 0;">神雕侠侣 · 智能江湖</h2>
        <div style="color:#888; font-size:12px;">自动保存已开启 ✨</div>
    </div>
    
    <div class="game-container">
        <div class="panel">
            <h3>【 角色状态 】</h3>
            <p>气血: <span id="hp" class="highlight">100</span> / 100</p>
            <p>内力: <span id="mp" class="highlight">50</span> / 50</p>
            <p>修为: <span id="exp" class="highlight">0</span></p>
            
            <h3>【 背包物品 】</h3>
            <ul id="inventory" style="padding-left: 20px; font-size: 14px;"></ul>
        </div>

        <div class="panel">
            <h3>【 当前场景：终南山下 】</h3>
            <div id="chatBox" class="chat-box"></div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="输入你的应对之策..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="btn-action" onclick="sendMessage()">交互</button>
            </div>
        </div>
    </div>
</div>

<script>
    let player = { hp: 100, mp: 50, exp: 0, inventory: ["初学木剑 x1"] };
    let chatHistory = []; 
    let systemMemory = []; 
    let isMusicPlaying = false; 

    window.onload = function() {
        const savedKey = localStorage.getItem('sd_api_key');
        if(savedKey) document.getElementById('apiKeyInput').value = savedKey;

        if(localStorage.getItem('sd_player_save')) {
            document.getElementById('btnContinue').disabled = false;
        }

        // 初始化默认音量 50%
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.5;
    }

    // 突破浏览器拦截，点击唤醒音乐
    function awaken江湖() {
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        
        audio.play().then(() => {
            isMusicPlaying = true;
            btn.innerText = "🔊 正在播放";
            btn.style.background = "#4caf50";
        }).catch(err => {
            console.log("音频播放受限，检查音频文件名是否完全一致:", err);
        });

        document.getElementById('introOverlay').style.display = 'none';
    }

    // 手动暂停/播放
    function toggleMusic() {
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        if (!isMusicPlaying) {
            audio.play().then(() => {
                isMusicPlaying = true;
                btn.innerText = "🔊 正在播放";
                btn.style.background = "#4caf50";
            }).catch(err => {
                alert("未找到音频文件，请确认 'bgm.mp3' 是否放在同一目录下！");
            });
        } else {
            audio.pause();
            isMusicPlaying = false;
            btn.innerText = "🔇 已静音";
            btn.style.background = "#5c4033";
        }
    }

    // 动态调节音量
    function adjustVolume(value) {
        const audio = document.getElementById('bgMusic');
        audio.volume = value / 100;
        document.getElementById('volumeVal').innerText = value + "%";
    }

    function toggleSettings(show) {
        document.getElementById('settingsModal').style.display = show ? 'flex' : 'none';
    }

    function saveSettings() {
        const key = document.getElementById('apiKeyInput').value.trim();
        localStorage.setItem('sd_api_key', key);
        alert('配置及音量已安全保存！');
        toggleSettings(false);
    }

    function startNewGame() {
        if(!checkApiKey()) return;
        if(localStorage.getItem('sd_player_save') && !confirm('检测到已有旧的人生，开启新人生将覆盖存档，是否继续？')) {
            return;
        }

        player = { hp: 100, mp: 50, exp: 0, inventory: ["初学木剑 x1"] };
        chatHistory = [`<p class="ai-msg"><strong>神秘跛足道人：</strong>喂！前面的小家伙，看你细皮嫩肉的。如今蒙古铁戏进逼、赤练仙子李莫愁满江湖寻仇，连终南山全真教和活死人墓都不太太平。你来这凑什么热闹？</p>`];
        systemMemory = []; 

        enterGameInterface();
        saveGame(); 
    }

    function continueGame() {
        if(!checkApiKey()) return;

        player = JSON.parse(localStorage.getItem('sd_player_save'));
        chatHistory = JSON.parse(localStorage.getItem('sd_chat_save')) || [];
        systemMemory = JSON.parse(localStorage.getItem('sd_memory_save')) || [];

        enterGameInterface();
    }

    // 检查配置
    function checkApiKey() {
        const key = localStorage.getItem('sd_api_key');
        if(!key) {
            alert('请先点击【系统设置】配置您的 API Key 才能行走江湖！');
            toggleSettings(true);
            return false;
        }
        return true;
    }

    // 进入聊天/游戏核心界面
    function enterGameInterface() {
        // 【核心修改点】：进入游戏界面时自动暂停大厅背景音乐
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        if (isMusicPlaying) {
            audio.pause();
            isMusicPlaying = false;
            btn.innerText = "🔇 已静音";
            btn.style.background = "#5c4033";
        }

        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        
        document.getElementById('hp').innerText = player.hp;
        document.getElementById('mp').innerText = player.mp;
        document.getElementById('exp').innerText = player.exp;
        updateInventoryUI();
        
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = chatHistory.join('');
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function saveGame() {
        localStorage.setItem('sd_player_save', JSON.stringify(player));
        localStorage.setItem('sd_chat_save', JSON.stringify(chatHistory));
        localStorage.setItem('sd_memory_save', JSON.stringify(systemMemory));
        document.getElementById('btnContinue').disabled = false;
    }

    async function sendMessage() {
        const apiKey = localStorage.getItem('sd_api_key');
        const userInputText = document.getElementById('userInput').value.trim();
        if (!userInputText) return;

        const chatBox = document.getElementById('chatBox');
        
        const userHtml = `<p class="user-msg"><strong>你：</strong>${userInputText}</p>`;
        chatBox.innerHTML += userHtml;
        chatHistory.push(userHtml);
        document.getElementById('userInput').value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        const loadingId = 'loading-' + Date.now();
        chatBox.innerHTML += `<p class="ai-msg" id="${loadingId}"><strong>江湖风云：</strong>正在推演大势...</p>`;

        systemMemory.push({ "role": "user", "content": userInputText });

        try {
            const messagesPayload = [
                {
                    "role": "system",
                    "content": `你现在是金庸武侠巨著《神雕侠侣》的文字挂机游戏剧情引擎。
                    【当前世界背景】
                    正值南宋末年，蒙古南侵，局势动荡。江湖中以全真教、古墓派、丐帮、桃花岛、西域白驼山等势力为首。赤练仙子李莫愁正因情生恨血洗江湖。
                    【核心规则】
                    1. 必须严格契合《神雕侠侣》的原著设定（涉及人物如杨过、小龙女、郭靖、黄蓉、李莫愁等）。
                    2. 密切关注上下文记忆，顺应玩家的选择衍生剧情，绝对不能答非所问、生硬跳跃。
                    
                    玩家当前属性：气血 ${player.hp}, 内力 ${player.mp}, 背包: ${player.inventory.join(',')}。
                    请严格返回以下格式的 JSON，不要包含任何常规文本或 Markdown 标记：
                    {
                        "reply": "遭遇到的人物对话或绝代江湖的场景异动描写",
                        "hp_change": 0, 
                        "exp_change": 0, 
                        "get_item": "" 
                    }`
                },
                ...systemMemory.slice(-8)
            ];

            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    response_format: { "type": "json_object" }, 
                    messages: messagesPayload,
                    temperature: 0.5 
                })
            });

            const data = await response.json();
            const gameResult = JSON.parse(data.choices[0].message.content);

            systemMemory.push({ "role": "assistant", "content": gameResult.reply });

            const aiHtml = `<p class="ai-msg"><strong>江湖人物：</strong>${gameResult.reply}</p>`;
            document.getElementById(loadingId).outerHTML = aiHtml;
            chatHistory.push(aiHtml);

            if (gameResult.hp_change !== 0) {
                player.hp += gameResult.hp_change;
                document.getElementById('hp').innerText = player.hp;
                logAndSaveSys(`[系统] 气血变化: ${gameResult.hp_change}`);
            }
            if (gameResult.exp_change !== 0) {
                player.exp += gameResult.exp_change;
                document.getElementById('exp').innerText = player.exp;
                logAndSaveSys(`[系统] 修为变化: +${gameResult.exp_change}`);
            }
            if (gameResult.get_item) {
                player.inventory.push(gameResult.get_item);
                updateInventoryUI();
                logAndSaveSys(`[系统] 获得物品: 【${gameResult.get_item}】`);
            }

            saveGame(); 
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            console.error(error);
            document.getElementById(loadingId).outerHTML = `<p class="ai-msg" style="color:red;"><strong>系统：</strong>飞鸽传书遭遇寒流拦截，未能送达。</p>`;
        }
    }

    function logAndSaveSys(text) {
        const sysHtml = `<p class="sys-msg">${text}</p>`;
        document.getElementById('chatBox').innerHTML += sysHtml;
        chatHistory.push(sysHtml);
    }

    function updateInventoryUI() {
        document.getElementById('inventory').innerHTML = player.inventory.map(item => `<li>${item}</li>`).join('');
    }

    // 返回主页面
    function returnToMain() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'block';

        // 【核心修改点】：返回主大厅时自动重新恢复背景音乐播放
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        audio.play().then(() => {
            isMusicPlaying = true;
            btn.innerText = "🔊 正在播放";
            btn.style.background = "#4caf50";
        }).catch(err => {
            console.log("主页自动恢复播放受限或文件缺失:", err);
        });
    }
</script>

</body>
</html>
